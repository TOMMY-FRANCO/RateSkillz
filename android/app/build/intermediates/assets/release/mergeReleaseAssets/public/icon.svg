<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="128" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Card icon -->
  <rect x="96" y="128" width="320" height="256" rx="24" fill="white" opacity="0.2"/>
  <rect x="112" y="144" width="288" height="224" rx="16" fill="white" opacity="0.9"/>

  <!-- Profile circle -->
  <circle cx="256" cy="220" r="48" fill="#06b6d4"/>

  <!-- Stats bars -->
  <rect x="152" y="300" width="208" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
  <rect x="152" y="320" width="176" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
  <rect x="152" y="340" width="192" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
</svg>
